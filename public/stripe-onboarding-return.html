<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding Complete — Stripe Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2236;
    --accent: #00e5a0;
    --accent2: #0095ff;
    --accent-glow: rgba(0, 229, 160, 0.18);
    --text: #f0f4ff;
    --muted: #6b7fa3;
    --border: rgba(255,255,255,0.07);
    --stripe-purple: #635bff;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── CANVAS BACKGROUND ── */
  #bg-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── GRID LINES ── */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* ── GLOW BLOBS ── */
  .blob {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: rgba(0,229,160,0.08); top: -100px; right: -100px; }
  .blob-2 { width: 400px; height: 400px; background: rgba(99,91,255,0.1); bottom: -80px; left: -80px; }
  .blob-3 { width: 300px; height: 300px; background: rgba(0,149,255,0.07); top: 40%; left: 40%; }

  /* ── LAYOUT ── */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }

  /* ── CARD ── */
  .card {
    width: 100%; max-width: 520px;
    background: linear-gradient(145deg, rgba(26,34,54,0.9), rgba(17,24,39,0.95));
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 52px 48px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(0,229,160,0.06),
      0 40px 80px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.06);
    opacity: 0;
    transform: translateY(32px);
    animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── ICON RING ── */
  .icon-wrap {
    position: relative;
    width: 88px; height: 88px;
    margin: 0 auto 32px;
  }

  .icon-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    background: linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: spinRing 4s linear infinite;
  }

  @keyframes spinRing {
    to { transform: rotate(360deg); }
  }

  .icon-inner {
    position: absolute; inset: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,229,160,0.15), rgba(0,149,255,0.1));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }

  /* ── PULSE ── */
  .pulse-ring {
    position: absolute; inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(0,229,160,0.25);
    animation: pulseRing 2s ease-out infinite;
  }
  .pulse-ring-2 {
    position: absolute; inset: -24px;
    border-radius: 50%;
    border: 1px solid rgba(0,229,160,0.12);
    animation: pulseRing 2s ease-out infinite 0.4s;
  }

  @keyframes pulseRing {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.5); }
  }

  /* ── LABEL ── */
  .label {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent);
    text-align: center; margin-bottom: 12px;
    opacity: 0; animation: fadeUp 0.6s ease 0.6s forwards;
  }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: 30px; font-weight: 800;
    line-height: 1.15; text-align: center;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
    background: linear-gradient(135deg, #f0f4ff 30%, rgba(0,229,160,0.9));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0; animation: fadeUp 0.6s ease 0.7s forwards;
  }

  .subtitle {
    font-size: 15px; font-weight: 300;
    color: var(--muted); text-align: center;
    line-height: 1.65; margin-bottom: 36px;
    opacity: 0; animation: fadeUp 0.6s ease 0.8s forwards;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin-bottom: 28px;
    opacity: 0; animation: fadeUp 0.6s ease 0.85s forwards;
  }

  /* ── CHECKLIST ── */
  .checklist {
    list-style: none; margin-bottom: 36px;
    opacity: 0; animation: fadeUp 0.6s ease 0.9s forwards;
  }

  .checklist li {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 14px; font-weight: 400; color: #c5cde8;
  }
  .checklist li:last-child { border-bottom: none; }

  .check-icon {
    flex-shrink: 0;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--accent);
    margin-top: 1px;
  }

  /* ── BUTTON ── */
  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 16px 24px;
    background: linear-gradient(135deg, var(--accent) 0%, #00c47d 100%);
    color: #031a10;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    border: none; border-radius: 14px;
    cursor: pointer; text-decoration: none;
    letter-spacing: 0.01em;
    box-shadow: 0 8px 30px rgba(0,229,160,0.25), 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    opacity: 0; animation: fadeUp 0.6s ease 1s forwards;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(0,229,160,0.35), 0 4px 12px rgba(0,0,0,0.3);
    filter: brightness(1.06);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 13px 24px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 400;
    border: 1px solid var(--border); border-radius: 14px;
    cursor: pointer; text-decoration: none;
    margin-top: 12px;
    transition: color 0.2s, border-color 0.2s;
    opacity: 0; animation: fadeUp 0.6s ease 1.05s forwards;
  }
  .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  /* ── FOOTER BADGE ── */
  .stripe-badge {
    display: flex; align-items: center; gap: 8px;
    justify-content: center; margin-top: 28px;
    font-size: 12px; color: var(--muted);
    opacity: 0; animation: fadeUp 0.6s ease 1.1s forwards;
  }
  .stripe-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--stripe-purple);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed; top: -10px;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none; z-index: 9999;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="grid-overlay"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<canvas id="bg-canvas"></canvas>

<main class="page">
  <div class="card">
    <div class="icon-wrap">
      <div class="pulse-ring-2"></div>
      <div class="pulse-ring"></div>
      <div class="icon-ring"></div>
      <div class="icon-inner">✓</div>
    </div>

    <p class="label">Stripe Connect · Onboarding</p>
    <h1 class="title">Your account is verified &amp; ready</h1>
    <p class="subtitle">You've successfully connected your Stripe account. You can now receive payouts directly.</p>

    <div class="divider"></div>

    <ul class="checklist">
      <li><span class="check-icon">✓</span><span>Identity verification complete</span></li>
      <li><span class="check-icon">✓</span><span>Bank account securely linked</span></li>
      <li><span class="check-icon">✓</span><span>Business details confirmed</span></li>
    </ul>

    <div class="stripe-badge">
      <div class="stripe-dot"></div>
      Secured by Stripe Connect
    </div>
  </div>
</main>

<script>
/* ── PARTICLE CANVAS ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initParticles() {
  particles = Array.from({length: 60}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    vx: (Math.random() - 0.5) * 0.25,
    vy: (Math.random() - 0.5) * 0.25,
    o: Math.random() * 0.5 + 0.1,
    color: Math.random() > 0.5 ? '0,229,160' : '0,149,255'
  }));
}

function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.o})`;
    ctx.fill();
  });
  requestAnimationFrame(drawParticles);
}

window.addEventListener('resize', () => { resize(); initParticles(); });
resize(); initParticles(); drawParticles();

/* ── CONFETTI ── */
const colors = ['#00e5a0','#0095ff','#635bff','#ffdd57','#ff6b6b','#c084fc'];
function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${Math.random() * 8 + 5}px;
        height: ${Math.random() * 8 + 5}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${Math.random() * 2 + 1.5}s;
        animation-delay: ${Math.random() * 0.6}s;
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 20);
  }
}

window.addEventListener('load', () => setTimeout(launchConfetti, 600));

function handleContinue(e) {
  e.preventDefault();
  // Navigate back to app or dashboard
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({ status: 'success', action: 'dashboard' }));
  } else {
    console.log('Navigate to dashboard');
  }
}
</script>
</body>
</html>
